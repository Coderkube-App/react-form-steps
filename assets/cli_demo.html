<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLI Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c0c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
  }
  .terminal {
    background: #1a1a2e;
    border-radius: 12px;
    width: 860px;
    min-height: 540px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    border: 1px solid #2a2a4a;
  }
  .titlebar {
    background: #16162a;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2a2a4a;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .titlebar-text {
    color: #888;
    font-size: 12px;
    margin-left: 8px;
  }
  .content {
    padding: 16px 20px;
    color: #e2e8f0;
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre;
    min-height: 490px;
  }
  .cyan { color: #22d3ee; }
  .green { color: #4ade80; }
  .yellow { color: #facc15; }
  .red { color: #f87171; }
  .bold { font-weight: 700; }
  .dim { color: #64748b; }
  .white { color: #f1f5f9; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #e2e8f0;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <span class="titlebar-text">Terminal вҖ” npx react-multistep-form</span>
  </div>
  <div class="content" id="output"></div>
</div>

<script>
const output = document.getElementById('output');

const BANNER = `<span class="cyan bold">  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘
  в–Ҳв–Ҳв•‘     в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘
  в•ҡв•җв•қ      в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қ      в•ҡв•җв•җв•җв•җв•җв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ     в•ҡв•җв•җв•җв•җв•җв•җв•қ</span>

         <span class="yellow">рҹҡҖ Generate customizable multi-step wizard forms in seconds!</span>
         <span class="green">вңЁ Choose a platform, language, form type, and field structure.</span>
`;

const steps = [
  { type: 'typeCommand', text: 'npx react-multistep-form', delay: 60 },
  { type: 'instant', text: '\n' + BANNER + '\n', delay: 600 },
  { type: 'select', question: 'Select Platform Structure:', options: ['Web (React)', 'React Native (Mobile)', 'None (Cancel)'], selected: 0, delay: 1200 },
  { type: 'select', question: 'Select Programming Language:', options: ['JavaScript (.js / .jsx)', 'TypeScript (.ts / .tsx)'], selected: 1, delay: 1000 },
  { type: 'select', question: 'Select Form Rendering Style:', options: ['Normal Inline Page Component', 'Popup / Modal Overlay Component'], selected: 0, delay: 1000 },
  { type: 'select', question: 'Select Form State Strategy:', options: ['Normal (React Hook Form)', 'Redux (React Hook Form + Redux Toolkit)'], selected: 0, delay: 1000 },
  { type: 'typeInput', question: 'How many steps do you want in the wizard?', default: '3', answer: '3', delay: 800 },
  { type: 'typeInput', question: 'How many input fields do you want per step?', default: '2', answer: '3', delay: 800 },
  { type: 'instant', text: '<span class="green">вҸі Generating form-steps scaffolding...</span>\n', delay: 1200 },
  { type: 'instant', text: '\n<span class="green bold">вң” Scaffolding created successfully inside folder: ./form-steps !</span>\n', delay: 400 },
  { type: 'instant', text: '\n<span class="bold white">Next steps to render: </span>\n  Import and render it in your App Component:\n  <span class="cyan">import { FormStepsWizard } from \'./form-steps\';</span>\n', delay: 400 },
  { type: 'instant', text: '\n<span class="green">Enjoy using react-multistep-form CLI! рҹҺү</span>\n', delay: 100 },
];

let html = '';

function appendHTML(newHtml) {
  html += newHtml;
  output.innerHTML = html;
}

function setHTML(newHtml) {
  html = newHtml;
  output.innerHTML = html;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function typeText(text, charDelay) {
  for (const ch of text) {
    appendHTML(ch);
    await sleep(charDelay);
  }
}

async function animateSelectOption(question, options, selectedIdx) {
  const baseHTML = html;
  const cyclePath = [];
  for (let i = 0; i <= selectedIdx; i++) {
    cyclePath.push(i);
  }

  for (let c = 0; c < cyclePath.length; c++) {
    const idx = cyclePath[c];
    let menuHtml = `<span class="bold white">${question}</span>\n`;
    for (let i = 0; i < options.length; i++) {
      if (i === idx) {
        menuHtml += `  <span class="cyan bold">вқҜ ${options[i]}</span>\n`;
      } else {
        menuHtml += `    ${options[i]}\n`;
      }
    }
    setHTML(baseHTML + menuHtml);
    await sleep(350);
  }

  await sleep(200);
  setHTML(baseHTML + `<span class="bold white">${question}</span> <span class="green">${options[selectedIdx]}</span>\n`);
}

async function animateTypeInput(question, defaultVal, answer) {
  const prompt = `<span class="bold white">${question}</span> <span class="dim">(default: ${defaultVal})</span>: `;
  appendHTML(prompt);
  await sleep(400);

  if (answer === defaultVal) {
    appendHTML(`<span class="green">${answer}</span>\n`);
  } else {
    for (const ch of answer) {
      appendHTML(ch);
      await sleep(120);
    }
    await sleep(200);
    appendHTML('\n');
  }
}

async function run() {
  appendHTML('<span class="green bold">вқҜ</span> ');

  for (const step of steps) {
    switch (step.type) {
      case 'typeCommand':
        await typeText(step.text, step.delay);
        await sleep(500);
        appendHTML('\n');
        break;
      case 'instant':
        await sleep(step.delay);
        appendHTML(step.text);
        break;
      case 'select':
        await animateSelectOption(step.question, step.options, step.selected);
        await sleep(step.delay);
        break;
      case 'typeInput':
        await animateTypeInput(step.question, step.default, step.answer);
        await sleep(step.delay);
        break;
    }
  }

  await sleep(300);
  appendHTML('\n<span class="green bold">вқҜ</span> <span class="cursor"></span>');

  // Wait then loop
  await sleep(3000);
  html = '';
  output.innerHTML = '';
  appendHTML('<span class="green bold">вқҜ</span> ');
  await run();
}

setTimeout(run, 800);
</script>
</body>
</html>
